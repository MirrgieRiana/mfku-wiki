name: Release ifrku-wiki-skill

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - uses: gradle/actions/setup-gradle@v4

      - run: cd ifrku-wiki-skill && ./gradlew build

      - uses: softprops/action-gh-release@v2
        with:
          files: ifrku-wiki-skill/build/distributions/*.zip
