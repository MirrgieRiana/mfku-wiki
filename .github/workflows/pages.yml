name: Pages

on:
  push:
    branches:
      - main

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare pages content
        run: |
          mkdir -p _pages
          cp README.md _pages/

          mkdir -p _pages/wiki-dump
          cp wiki-dump/all.wiki.json _pages/wiki-dump/
          cp wiki-dump/all.wiki.txt _pages/wiki-dump/

      - uses: actions/jekyll-build-pages@v1
        with:
          source: _pages

      - uses: actions/upload-pages-artifact@v3

      - id: deployment
        uses: actions/deploy-pages@v4
