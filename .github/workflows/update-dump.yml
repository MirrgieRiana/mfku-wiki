name: Update Wiki Dump

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dump:
    runs-on: ubuntu-latest
    env:
      WIKIWIKI_KEY_ID: ${{ secrets.WIKIWIKI_KEY_ID }}
      WIKIWIKI_SECRET: ${{ secrets.WIKIWIKI_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Download dump from WikiWiki.jp
        run: node scripts/download-dump.mjs

      - name: Upload screenshots (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/

      - name: Upload dump
        uses: actions/upload-artifact@v4
        with:
          name: wiki-dump
          path: dumps/*.tar.gz
