name: Copilot Setup Steps
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment: copilot
    permissions:
      contents: read
    env:
      WIKIWIKI_KEY_ID: ${{ secrets.WIKIWIKI_KEY_ID }}
      WIKIWIKI_SECRET: ${{ secrets.WIKIWIKI_SECRET }}
    steps:
      - uses: actions/checkout@v4
