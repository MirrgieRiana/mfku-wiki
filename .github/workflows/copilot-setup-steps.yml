name: Copilot Setup Steps
on: workflow_dispatch

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    environment: copilot
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Write wikiwiki credentials
        env:
          WIKIWIKI_KEY_ID: ${{ secrets.WIKIWIKI_KEY_ID }}
          WIKIWIKI_SECRET: ${{ secrets.WIKIWIKI_SECRET }}
        run: |
          mkdir -p ~/.wikiwiki
          echo "$WIKIWIKI_KEY_ID" > ~/.wikiwiki/WIKIWIKI_KEY_ID
          echo "$WIKIWIKI_SECRET" > ~/.wikiwiki/WIKIWIKI_SECRET
          chmod 600 ~/.wikiwiki/WIKIWIKI_KEY_ID ~/.wikiwiki/WIKIWIKI_SECRET
